<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cs2 hack</title>
    <style>
        body {
            background-color: rgb(53, 53, 53);
            color: white;
            font-family: Arial, sans-serif;
            margin: 8px;
            padding-top: 30px;
        }
    
        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            background: rgb(26, 26, 26);
            color: white;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            position: fixed;
            border-bottom: 1px solid black;
            top: 0;
            left: 0;
            z-index: 10000;
        }
    
        #latencyValue {
            font-weight: normal;
            font-size: 13px;
            opacity: 0.85;
        }
    
        .message {
            display: none;
        }
    
        #playerlist,
        #radarbox,
        #settingsbox {
            top: 41px;
            left: 0;
            position: absolute;
            background: rgb(44, 44, 44);
            color: white;
            border: 1px solid black;
            box-sizing: border-box;
            z-index: 1;
        }
        #radarbox {
            top: 41px;
            left: 0;
            width: 320px;
            height: 320px;
            display: flex;
            flex-direction: column;
        }
        
        #playerlist {
            top: 41px;
            left: 0;
            width: 520px;
            min-height: 20px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        
        #settingsbox {
            top: 41px;
            width: 275px;
        }
    
        .title {
            display: block;
            background: rgb(26, 26, 26);
            padding: 5px;
            cursor: grab;
            font-weight: bold;
            border-bottom: 1px solid black;
            user-select: none;
        }
    
        .resizer {
            position: absolute;
            bottom: 0;
            right: 0;
        }
    
        #playerlist .resizer {
            width: 10px;
            height: 50px;
            cursor: w-resize;
        }
    
        #radarbox .resizer {
            width: 14px;
            height: 14px;
            cursor: nwse-resize;
        }
    
        #radarcanvas {
            width: 100%;
            height: calc(100% - 31px);
            display: block;
            background: rgb(44, 44, 44);
            flex: 1;
        }
    
        .settings-content {
            padding: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
    
        #settingsbox input[type="text"] {
            background-color: rgb(44, 44, 44);
            color: white;
            border: 1px solid black;
            padding: 6px 10px;
            font-size: 14px;
            outline: none;
            width: 150px;
            box-sizing: border-box;
            flex: 1;
        }
    
        #settingsbox button {
            background-color: rgb(44, 44, 44);
            color: white;
            border: 1px solid black;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-sizing: border-box;
        }
    
        #settingsbox button:hover {
            background-color: rgb(39, 39, 39);
        }
    
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 5px 0;
            margin-top: 1px;
            margin-bottom: 0;
        }
    
        th, td {
            padding: 5px;
            text-align: left;
            border-bottom: 1px solid black;
        }
    
        td:nth-child(1) { width: 25%; }
        td:nth-child(2) { width: 15%; }
        td:nth-child(3), td:nth-child(5) { width: 10%; }
        td:nth-child(4) { width: 20%; }
        td:nth-child(6) { width: 20%; }
    
        table tr:last-child td {
            border-bottom: none;
        }
    
        a {
            color: white;
            text-decoration: none;
        }
    
        a:hover,
        a:focus,
        a:active {
            color: white;
            text-decoration: none;
        }
    
        @media (max-width: 940px) {
            #playerlist {
                left: 0;
            }
        }
    
        @media (max-height: 400px) {
            body {
                margin: 0;
                padding: 0;
                font-size: 12px;
                background-color: black;
            }
    
            .bar {
                display: none;
            }
    
            .message {
                display: block;
            }
    
            #playerlist {
                display: block;
                margin: 0;
                padding: 0;
                top: 0 !important;
                left: 0 !important;
                background: transparent !important;
                border: none !important;
                width: 100% !important;
                height: 100% !important;
                min-width: 0;
            }
    
            #playerlist .title {
                display: none;
            }
    
            #playerlist .resizer {
                display: none;
            }
    
            #radarbox,
            #settingsbox {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <header class="bar">
        <span>cs2 hack</span>
        <span id="latencyValue">no connection</span>
    </header>
    <h1>inactive</h1>
    <p class="message">no data for this session yet</p>
    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
